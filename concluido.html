   <script>

function abrirMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.add(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.add(
      'active'
    );

}

function fecharMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.remove(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.remove(
      'active'
    );

}

</script>
