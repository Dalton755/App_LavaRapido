<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Aguardando Lavagem</title>

<link rel="stylesheet"
      href="./css/style.css">

</head>

<body>
      <div
  id="overlay"
  class="overlay"
  onclick="fecharMenu()">

</div>

<nav
  id="sidebar"
  class="sidebar">

  <a href="index.html">
    🏠 Dashboard
  </a>

  <a href="solicitacoes.html">
    📋 Solicitações
  </a>

  <a href="aguardando.html">
    🚗 Aguardando Lavagem
  </a>

  <a href="concluido.html">
    ✅ Concluídos
  </a>

</nav>


<header class="topbar">

      <div
  class="menu-btn"
  onclick="abrirMenu()">

  ☰

</div>
  <div class="logo-area">

    <h1>Aguardando Lavagem</h1>

    <span>Fila operacional</span>

  </div>

</header>

<main class="container">

      

  <div class="filtro-fixo">

  <input
    type="text"
    id="filtroPlaca"
    placeholder="🔍 Buscar placa..."
    onkeyup="carregarAguardando()">

</div>



  <div
    id="listaAguardando"
    class="lista-cards">

  </div>

</main>

<script src="./js/config.js"></script>

<script src="./js/aguardando.js"></script>

<script>

function abrirMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.add(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.add(
      'active'
    );

}

function fecharMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.remove(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.remove(
      'active'
    );

}

</script>

      
</body>

</html>
