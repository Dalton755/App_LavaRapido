   <script>

function abrirMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.add(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )

}

function fecharMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.remove(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.remove(

    );

}
