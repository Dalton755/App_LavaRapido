<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
   content="width=device-width, initial-scale=1.0">

<title>Lavagem</title>

<link rel="stylesheet"
      href="./css/style.css">

</head>

<body>

<header class="topbar">

  <div class="logo-area">


<h1>Lavagem</h1>

<span>Checklist da lavagem</span>


  </div>

</header>

<main class="container">

  <div class="card">


<h2 id="placa"></h2>


  </div>

  <div class="card">


<div class="form-group">

  <label>Nome do Lavador</label>

  <input
    type="text"
    id="lavador">

</div>


  </div>

  <div class="card">


<h3>Parte Interna</h3>

<div class="checklist">

  <label><input type="checkbox" value="Bancos"> Bancos</label>

  <label><input type="checkbox" value="Painel"> Painel</label>

  <label><input type="checkbox" value="Tapetes"> Tapetes</label>

  <label><input type="checkbox" value="Canto de Porta"> Canto de Porta</label>

</div>


  </div>

  <div class="card">


<h3>Parte Externa</h3>

<div class="checklist">

  <label><input type="checkbox" value="Lataria"> Lataria</label>

  <label><input type="checkbox" value="Vidros"> Vidros</label>

  <label><input type="checkbox" value="Teto"> Teto</label>

  <label><input type="checkbox" value="Rodas"> Rodas</label>

  <label><input type="checkbox" value="WAP"> WAP</label>

  <label><input type="checkbox" value="Pretinho"> Pretinho</label>

</div>


  </div>

<button
 class="btn btn-green"
 onclick="concluirLavagem()">


Concluir Lavagem


  </button>

</main>

<script src="./js/config.js"></script>

<script src="./js/lavagem.js"></script>

</body>

</html>
