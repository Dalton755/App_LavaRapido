<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Lava Rápido</title>

  <link rel="stylesheet"
        href="./css/style.css">

</head>

<script src="./js/config.js"></script>

<script src="./js/index.js"></script>

  
  
<body>

  <div
  id="overlay"
  class="overlay"
  onclick="fecharMenu()">

</div>

<nav
  id="sidebar"
  class="sidebar">

  <a href="index.html">
    🏠 Dashboard
  </a>

  <a href="solicitacoes.html">
    📋 Solicitações
  </a>

  <a href="aguardando.html">
    🚗 Aguardando Lavagem
  </a>

  <a href="concluido.html">
    ✅ Concluídos
  </a>

</nav>


  <header class="topbar">

    <div
      class="menu-btn"
      onclick="abrirMenu()">

      ☰

    </div>
    <div class="logo-area">

      <h1>Lava Rápido</h1>

      <span>Operação em tempo real</span>

    </div>

  </header>

  <main class="container">

<div class="menu-grid">

  <a href="solicitacoes.html"
     class="menu-card">

    <div class="menu-top">

      <h2>Solicitações</h2>

      <div
        id="totalSolicitacoes"
        class="badge">

        0

      </div>

    </div>

    <p>
      Veículos aguardando movimentação
    </p>

  </a>

  <a href="aguardando.html"
     class="menu-card">

    <div class="menu-top">

      <h2>Aguardando</h2>

      <div
        id="totalAguardando"
        class="badge badge-yellow">

        0

      </div>

    </div>

    <p>
      Veículos em fila de lavagem
    </p>

  </a>

  <a href="concluido.html"
     class="menu-card">

    <div class="menu-top">

      <h2>Concluídos Hoje</h2>

      <div
        id="totalConcluidos"
        class="badge badge-green">

        0

      </div>

    </div>

    <p>
      Lavagens finalizadas hoje
    </p>

  </a>

</div>



  </main>


  <script>

function abrirMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.add(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.add(
      'active'
    );

}

function fecharMenu(){

  document
    .getElementById(
      'sidebar'
    )
    .classList.remove(
      'active'
    );

  document
    .getElementById(
      'overlay'
    )
    .classList.remove(
      'active'
    );

}

</script>

</body>

</html>
