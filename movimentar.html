<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Movimentar</title>

  <link rel="stylesheet"
        href="./css/style.css">

</head>

<body>

  <header class="topbar">

    <div class="logo-area">

      <h1>Movimentação</h1>

      <span>Registrar veículo</span>

    </div>

  </header>

  <main class="container">

    <div class="card">

      <div class="card-info">

        <div>

          <strong>Placa</strong>

          <div id="placa"></div>

        </div>

        <div>

          <strong>Responsável</strong>

          <div id="responsavel"></div>

        </div>

        <div>

          <strong>Agência</strong>

          <div id="agencia"></div>

        </div>

      </div>

    </div>

    <div class="card">

      <div class="form-group">

        <label>
          Foto da Frente
        </label>

        <input
          type="file"
          id="foto"
          accept="image/*"
          capture="environment">
          <div class="preview-container">

            <img
              id="previewImagem"
              class="preview-imagem"
              style="display:none;">
          
          </div>


      </div>

      <div class="form-group">

        <label>
          Nome do Movimentador
        </label>

        <input
          type="text"
          id="movimentador"
          placeholder="Digite o nome">

      </div>

      <div class="form-group">

        <label>
          Tipo de Lavagem
        </label>

        <select id="tipoLavagem">

          <option value="">
            Selecione
          </option>

          <option>
            Simples
          </option>

          <option>
            Completa
          </option>

          <option>
            Simples com Jato
          </option>

          <option>
            Completa com Jato
          </option>

        </select>

      </div>

      <button
        class="btn"
        onclick="movimentar()">

        Confirmar Movimentação

      </button>

    </div>

  </main>

  <script src="./js/config.js"></script>

  <script src="./js/movimentar.js"></script>

</body>

</html>
