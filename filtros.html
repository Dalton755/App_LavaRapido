<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Filtros</title>

<link rel="stylesheet"
      href="./css/style.css">

</head>

<body>

<header class="topbar">

<h1>Filtros</h1>

</header>

<main class="container">

<div class="card">

  <label>Período</label>

  <input
    type="text"
    id="periodo"
    placeholder="01/06/2026 → 15/06/2026">

</div>

<div class="card">

  <label>Filtrar por</label>

  <select id="tipoFiltro">

    <option value="">
      Selecione
    </option>

    <option value="LOJA">
      Loja
    </option>

    <option value="TIPO">
      Tipo de Lavagem
    </option>

  </select>

</div>

<div id="filtroSecundario"></div>

<div id="resultadoFiltro"></div>

</main>

<script src="./js/config.js"></script>
<script src="./js/filtros.js"></script>

</body>

</html>
